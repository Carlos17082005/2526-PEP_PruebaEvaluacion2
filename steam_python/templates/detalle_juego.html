<!-- templates/detalle_juego.html -->
{% extends "base.html" %} 

{% block content %}
    <div>
        <h2>
            {{ object.nombre_juego }} 
            <a href="{% url 'editar_juego' juego.pk %}"><button> Editar Juego </button></a>
            <a href="{% url 'eliminar_juego' juego.pk %}"><button> Eliminar Juego </button></a>
        </h2>
        <p>Creado por: {{ object.autor }}</p>
        <img src="/media/{{ object.imagen }}" alt="no se puede ver la imagen" style="width: 300px;">
    </div>
{% endblock content %}
