<!-- templates/detalle_juego.html -->
{% extends "base.html" %} 

{% block content %}
    <div>
        <h2>{{ object.nombre_juego }}</h2>
        <p>Creado por: {{ object.autor }}</p>
        <img src="/media/{{ object.imagen }}" alt="no se puede ver la imagen" style="width: 300px;">
        <a href="{% url 'eliminar_juego' object.nombre_juego %}"><button> Eliminar Juego </button></a>
    </div>
{% endblock content %}
